apiVersion: v1
kind: Service
metadata:
  name: new-jenkins
  namespace: skala-practice
  labels:
    app: new-jenkins
spec:
  selector:
    app: new-jenkins
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Jenkins JNLP Agent 연결 전용 서비스
# Kubernetes 동적 Pod 에이전트가 컨트롤러에 접속하는 채널
apiVersion: v1
kind: Service
metadata:
  name: new-jenkins-agent
  namespace: skala-practice
  labels:
    app: new-jenkins
spec:
  selector:
    app: new-jenkins
  ports:
    - name: jnlp
      protocol: TCP
      port: 50000
      targetPort: 50000
  type: ClusterIP
