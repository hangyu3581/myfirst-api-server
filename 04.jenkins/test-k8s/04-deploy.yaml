apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-jenkins
  namespace: skala-practice
  labels:
    app: new-jenkins
spec:
  # Jenkins 컨트롤러는 단일 레플리카 운영
  # (Active-Active HA 는 별도 플러그인 없이 지원 불가)
  replicas: 1
  selector:
    matchLabels:
      app: new-jenkins
  template:
    metadata:
      labels:
        app: new-jenkins
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/prometheus"
        update: "xxxxxx5"
    spec:
      serviceAccountName: skala-admin-sa
      # fsGroup=1000 → PVC 마운트 디렉토리 GID를 jenkins 그룹으로 설정
      securityContext:
        fsGroup: 1000
        runAsUser: 1000

      # PVC에 이미 존재하는 디렉토리의 UID 소유권을 jenkins(1000)으로 수정
      # (fsGroup은 GID만 변경하므로, buildah 등이 UID 소유권 검사 시 실패 방지)
      # -R 없이 전체 재귀 chown 하면 파일이 많을 때 기동 지연 발생 →
      # 문제 경로(.config)만 타겟팅하여 최소 범위로 수정
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown 1000:1000 /var/jenkins_home
              [ -d /var/jenkins_home/.config ] && chown -R 1000:1000 /var/jenkins_home/.config || true
          securityContext:
            runAsUser: 0   # root로 실행해야 chown 가능
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

      containers:
        - name: jenkins
          image: amdp-registry.skala-ai.com/library/skala-new-jenkins:1.0
          imagePullPolicy: IfNotPresent   # Dockerfile 재빌드 후 동일 태그로 push해도 최신 이미지 사용
          ports:
            - name: http
              containerPort: 8080
            - name: jnlp
              containerPort: 50000

          env:
            - name: KUBECONFIG
              value: ""   # Dockerfile KUBECONFIG 빈값으로 오버라이드 → in-cluster SA 토큰 사용
            - name: JENKINS_OPTS
              value: "--httpPort=8080"
            - name: JAVA_OPTS
              value: >-
                -Xms512m
                -Xmx4096m
                -Djenkins.install.runSetupWizard=false
                -Djenkins.CLI.disabled=true
                -Djenkins.security.ApiTokenProperty.adminCanGenerateNewTokens=true
                -Dhudson.slaves.NodeProvisioner.initialDelay=0
                -Dhudson.slaves.NodeProvisioner.MARGIN=50
                -Dhudson.slaves.NodeProvisioner.MARGIN0=0.85
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_config/jenkins.yaml

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: jenkins-config
              mountPath: /var/jenkins_config

          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "6Gi"

          securityContext:
            privileged: true    # buildah이 컨테이너 빌드 시 필요한 권한 (agent any + buildah)

          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: new-jenkins-pvc
        - name: jenkins-config
          configMap:
            name: new-jenkins-config
