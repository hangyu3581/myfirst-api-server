apiVersion: v1
kind: ConfigMap
metadata:
  name: sk199-jenkins-config
  namespace: class-3
  labels:
    app: sk199-jenkins
    component: config
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "SKALA DevOps Study - Jenkins CI/CD (Multi-User)"
      numExecutors: 2
      mode: NORMAL

      crumbIssuer:
        standard:
          excludeClientIPFromCrumb: true  # nginx reverse proxy 뒤에서 webhook crumb 검증 허용

      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "admin"
            - id: "skala01"
              password: "skala"
            - id: "skala02"
              password: "skala"
            - id: "skala03"
              password: "skala"
            - id: "skala04"
              password: "skala"

      authorizationStrategy:
        roleBased:
          roles:
            global:
              - name: "admin"
                description: "Jenkins 전체 관리자"
                permissions:
                  - "Overall/Administer"
                entries:
                  - user: "admin"
              - name: "global-read"
                description: "인증된 사용자 기본 접근"
                permissions:
                  - "Overall/Read"
                  - "View/Read"
                entries:
                  - group: "authenticated"
            items:
              - name: "folder-owner-skala01"
                description: "skala01 전용 폴더 관리 권한"
                pattern: "skala01(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala01"
              - name: "folder-owner-skala02"
                description: "skala02 전용 폴더 관리 권한"
                pattern: "skala02(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala02"
              - name: "folder-owner-skala03"
                description: "skala03 전용 폴더 관리 권한"
                pattern: "skala03(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala03"
              - name: "folder-owner-skala04"
                description: "skala04 전용 폴더 관리 권한"
                pattern: "skala04(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala04"

      clouds:
        - kubernetes:
            name: "skala"
            serverUrl: ""
            namespace: "class-3"
            jenkinsUrl: "http://sk199-jenkins:8080"
            jenkinsTunnel: "sk199-jenkins-agent:50000"
            connectTimeout: 5
            readTimeout: 15
            maxRequestsPerHostStr: "32"
            retentionTimeout: 5
            templates:
              - name: "maven-agent"
                label: "maven"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "maven"
                    image: "maven:3.9-eclipse-temurin-17"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                volumes:
                  - persistentVolumeClaim:
                      claimName: "sk199-jenkins-pvc"
                      mountPath: "/home/jenkins/agent"
                      readOnly: false
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "kubectl-agent"
                label: "kubectl"
                nodeUsageMode: EXCLUSIVE
                serviceAccount: "skala-admin-sa"      # kubectl이 클러스터 API에 접근하기 위해 jenkins SA 사용
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "kubectl"
                    image: "alpine/k8s:1.29.2"    # alpine 기반 → /bin/sh 있음, kubectl 포함
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                volumes:
                  - persistentVolumeClaim:
                      claimName: "sk199-jenkins-pvc"
                      mountPath: "/home/jenkins/agent"
                      readOnly: false
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "kaniko-agent"
                label: "kaniko"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "kaniko"
                    image: "gcr.io/kaniko-project/executor:debug"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                    envVars:
                      - envVar:
                          key: "DOCKER_CONFIG"              # kaniko가 인증 정보를 읽는 경로
                          value: "/kaniko/.docker"
                volumes:
                  - persistentVolumeClaim:
                      claimName: "sk199-jenkins-pvc"
                      mountPath: "/home/jenkins/agent"
                      readOnly: false
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0

    security:
      queueItemAuthenticator:
        authenticators:
          - global:
              strategy: "triggeringUsersAuthorizationStrategy"

    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  id: "skala-github-id"
                  description: "GitHub PAT (소스 클론 및 gitops 브랜치 푸시용)"
                  username: "himang10"
                  password: "${GITHUB_PAT}"
                  scope: GLOBAL
              - usernamePassword:
                  id: "skala-image-registry-id"
                  description: "Harbor Registry 인증 (이미지 빌드/푸시용)"
                  username: "robot$skala25a"
                  password: "1qB9cyusbNComZPHAdjNIFWinf52xaBJ"
                  scope: GLOBAL

    jobs:
      - script: |
          ['skala01', 'skala02', 'skala03', 'skala04'].each { userId ->
            folder(userId) {
              description(userId + " 전용 CI/CD 작업 공간\n이 폴더 안에 Pipeline Job 을 생성하세요.")
              displayName(userId + " Workspace")
            }
          }

    tool:
      jdk:
        installations:
          - name: "JDK17"
            home: "/opt/java/jdk-17"
          - name: "JDK21"
            home: "/opt/java/openjdk"
      maven:
        installations:
          - name: "Maven3"
            home: "/usr/share/maven"
      gradle:
        installations:
          - name: "Gradle8"
            home: "/opt/gradle"
      git:
        installations:
          - name: "Default"
            home: "git"

    unclassified:
      location:
        url: "https://sk199-jenkins.skala25a.project.skala-ai.com/"  # Jenkins Root URL (webhook 응답 URL 생성에 사용)
