apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-jenkins
  namespace: skala-practice
  labels:
    app: new-jenkins
spec:
  # Jenkins 컨트롤러는 단일 레플리카 운영
  # (Active-Active HA 는 별도 플러그인 없이 지원 불가)
  replicas: 1
  selector:
    matchLabels:
      app: new-jenkins
  template:
    metadata:
      labels:
        app: new-jenkins
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/prometheus"
    spec:
      serviceAccountName: jenkins
      # fsGroup=1000 → PVC 마운트 디렉토리 소유권을 jenkins 유저로 설정
      securityContext:
        fsGroup: 1000
        runAsUser: 1000

      # PVC 권한 초기화 (InitContainer)
      initContainers:
        - name: volume-permission-fix
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/jenkins_home"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

      containers:
        - name: jenkins
          image: amdp-registry.skala-ai.com/library/skala-new-jenkins:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: jnlp
              containerPort: 50000

          env:
            - name: KUBECONFIG
              value: ""   # Dockerfile ENV KUBECONFIG 를 빈값으로 오버라이드 → in-cluster SA 토큰 사용
            - name: JENKINS_OPTS
              value: "--httpPort=8080"
            - name: JAVA_OPTS
              value: >-
                -Xms512m
                -Xmx4096m
                -Djenkins.install.runSetupWizard=false
                -Djenkins.CLI.disabled=true
                -Djenkins.security.ApiTokenProperty.adminCanGenerateNewTokens=true
                -Dhudson.slaves.NodeProvisioner.initialDelay=0
                -Dhudson.slaves.NodeProvisioner.MARGIN=50
                -Dhudson.slaves.NodeProvisioner.MARGIN0=0.85
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_config/jenkins.yaml

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: jenkins-config
              mountPath: /var/jenkins_config

          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "6Gi"

          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: new-jenkins-pvc
        - name: jenkins-config
          configMap:
            name: new-jenkins-config
