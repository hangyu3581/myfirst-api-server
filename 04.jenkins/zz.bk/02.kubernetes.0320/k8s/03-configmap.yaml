apiVersion: v1
kind: ConfigMap
metadata:
  name: new-jenkins-config
  namespace: skala-practice
  labels:
    app: new-jenkins
    component: config
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "SKALA DevOps Study - Jenkins CI/CD (Multi-User)"
      numExecutors: 2
      mode: NORMAL

      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "admin"
            - id: "skala01"
              password: "skala"
            - id: "skala02"
              password: "skala"
            - id: "skala03"
              password: "skala"
            - id: "skala04"
              password: "skala"

      authorizationStrategy:
        roleBased:
          roles:
            global:
              - name: "admin"
                description: "Jenkins 전체 관리자"
                permissions:
                  - "Overall/Administer"
                entries:
                  - user: "admin"
              - name: "global-read"
                description: "인증된 사용자 기본 접근"
                permissions:
                  - "Overall/Read"
                  - "View/Read"
                entries:
                  - group: "authenticated"
            items:
              - name: "folder-owner-skala01"
                description: "skala01 전용 폴더 관리 권한"
                pattern: "skala01(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala01"
              - name: "folder-owner-skala02"
                description: "skala02 전용 폴더 관리 권한"
                pattern: "skala02(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala02"
              - name: "folder-owner-skala03"
                description: "skala03 전용 폴더 관리 권한"
                pattern: "skala03(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala03"
              - name: "folder-owner-skala04"
                description: "skala04 전용 폴더 관리 권한"
                pattern: "skala04(/.*)?"
                permissions:
                  - "Job/Build"
                  - "Job/Cancel"
                  - "Job/Configure"
                  - "Job/Create"
                  - "Job/Delete"
                  - "Job/Discover"
                  - "Job/Read"
                  - "Job/Workspace"
                  - "Run/Delete"
                  - "Run/Replay"
                  - "Run/Update"
                  - "View/Configure"
                  - "View/Create"
                  - "View/Delete"
                  - "View/Read"
                entries:
                  - user: "skala04"

      clouds:
        - kubernetes:
            name: "skala"
            serverUrl: ""
            namespace: "skala-practice"
            jenkinsUrl: "http://new-jenkins:8080"
            jenkinsTunnel: "new-jenkins-agent:50000"
            connectTimeout: 5
            readTimeout: 15
            maxRequestsPerHostStr: "32"
            retentionTimeout: 5
            templates:
              - name: "default"
                label: "k8s-agent"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                volumes:
                  - emptyDirVolume:
                      mountPath: "/tmp"
                      memory: false
                podRetention: "never"
                activeDeadlineSeconds: 1800
                idleMinutes: 0
              - name: "maven-agent"
                label: "maven"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "maven"
                    image: "maven:3.9-eclipse-temurin-17"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "maven-jdk21-agent"
                label: "maven21"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "maven"
                    image: "maven:3.9-eclipse-temurin-21"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "buildah-agent"
                label: "buildah"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "buildah"
                    image: "quay.io/buildah/stable:latest"
                    command: "sleep"
                    args: "9999999"
                    privileged: true
                    workingDir: "/home/jenkins/agent"
                    envVars:
                      - envVar:
                          key: "BUILDAH_ISOLATION"
                          value: "chroot"
                      - envVar:
                          key: "STORAGE_DRIVER"
                          value: "vfs"
                      - envVar:
                          key: "REGISTRY_AUTH_FILE"
                          value: "/var/jenkins/.docker/.dockerconfigjson"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                volumes:
                  - secretVolume:
                      secretName: "harbor-registry-secret"
                      mountPath: "/var/jenkins/.docker"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "kubectl-agent"
                label: "kubectl"
                nodeUsageMode: EXCLUSIVE
                serviceAccount: "jenkins"      # kubectl이 클러스터 API에 접근하기 위해 jenkins SA 사용
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "kubectl"
                    image: "bitnami/kubectl:latest"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "kaniko-agent"
                label: "kaniko"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "kaniko"
                    image: "gcr.io/kaniko-project/executor:debug"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                    envVars:
                      - envVar:
                          key: "container"
                          value: "kaniko"
                volumes:
                  - secretVolume:
                      secretName: "harbor-registry-secret"
                      mountPath: "/kaniko/.docker"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0
              - name: "maven-kaniko-agent"
                label: "maven-kaniko"
                nodeUsageMode: EXCLUSIVE
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest-jdk21"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "maven"
                    image: "maven:3.9-eclipse-temurin-17"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "kaniko"
                    image: "gcr.io/kaniko-project/executor:debug"
                    command: "sleep"
                    args: "9999999"
                    workingDir: "/home/jenkins/agent"
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                    envVars:
                      - envVar:
                          key: "DOCKER_CONFIG"
                          value: "/kaniko/.docker"
                volumes:
                  - secretVolume:
                      secretName: "harbor-registry-secret"
                      mountPath: "/kaniko/.docker"
                podRetention: "never"
                activeDeadlineSeconds: 3600
                idleMinutes: 0

    security:
      queueItemAuthenticator:
        authenticators:
          - global:
              strategy: "triggeringUsersAuthorizationStrategy"

    jobs:
      - script: |
          ['skala01', 'skala02', 'skala03', 'skala04'].each { userId ->
            folder(userId) {
              description(userId + " 전용 CI/CD 작업 공간\n이 폴더 안에 Pipeline Job 을 생성하세요.")
              displayName(userId + " Workspace")
            }
          }

    tool:
      jdk:
        installations:
          - name: "JDK17"
            home: "/opt/java/jdk-17"
          - name: "JDK21"
            home: "/opt/java/openjdk"
      maven:
        installations:
          - name: "Maven3"
            home: "/usr/share/maven"
      gradle:
        installations:
          - name: "Gradle8"
            home: "/opt/gradle"
      git:
        installations:
          - name: "Default"
            home: "git"
