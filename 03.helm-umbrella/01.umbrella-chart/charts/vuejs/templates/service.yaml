apiVersion: v1
kind: Service
metadata:
  name: {{ include "vuejs.appName" . }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ include "vuejs.appName" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
    - name: mgmt
      protocol: TCP
      port: {{ .Values.service.mgmtPort }}
      targetPort: {{ .Values.service.mgmtPort }}
  type: {{ .Values.service.type }}
