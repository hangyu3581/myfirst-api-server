apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: sk199-deploy-pipeline-run-320bdb2e
  namespace: skala-tekton
spec:
  pipelineRef:
    name: deploy-pipeline
  workspaces:
    - name: shared-workspace # 소스코드, 빌드산출물
      persistentVolumeClaim:
        claimName: sk199-shared-workspace-pvc  # shared-workspace PVC를 참조
    - name: maven-settings  # settings.xml
      persistentVolumeClaim:
        claimName: sk199-shared-workspace-pvc  # shared-workspace PVC를 참조
    - name: maven-local-repo  # m2 repository
      persistentVolumeClaim:
        claimName: sk199-shared-workspace-pvc  # shared-workspace PVC를 참조
    - name: kubeconfig-dir # kubeconfig
      configMap:
        name: kubeconfig
  podTemplate:
    securityContext:
      fsGroup: 0  # 볼륨을 사용하는 그룹 ID
      runAsUser: 0  # Pod를 실행하는 사용자 ID
      runAsGroup: 0  # Pod를 실행하는 그룹 ID
  params:
    - name: git-url
      value: https://github.com/himang10/myfirst-api-server.git
    - name: git-revision
      value: master
    - name: image-registry
      value: amdp-registry.skala-ai.com/skala25a
    - name: image-name
      value: sk199-myfirst-api-server
    - name: image-tag
      value: 1.0.0
  serviceAccountName: sk199-pipeline-sa
