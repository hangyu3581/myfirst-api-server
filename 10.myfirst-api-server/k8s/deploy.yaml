apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk067-myfirst-api-server
  namespace: class-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sk067-myfirst-api-server
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/actuator/prometheus'
        update: 320bdb2e
      labels:
        app: sk067-myfirst-api-server
    spec:
      serviceAccountName: default
      containers:
      - name: myfirst-api-server
        image: amdp-registry.skala-ai.com/skala25a/sk067-myfirst-api-server:1.0.0-6-8a752c83
        imagePullPolicy: Always
        env:
        - name: USER_NAME
          value: sk067
        - name: NAMESPACE
          value: class-3
        - name: SPRING_PROFILES_ACTIVE  
          value: "prod"  
